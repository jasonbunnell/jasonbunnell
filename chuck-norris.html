<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <!--Import Google Icon Font-->
   <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
   <!--Import materialize.css-->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
   <link type="text/css" rel="stylesheet" href="css/main.css" />
   <title>Chuck Norris jokes</title>
</head>

<body>
   <div class="container">
      <h2>Chuck Norris</h2>
      <h4>joke generator</h4>
      <form>
         <div class="row">
            <div class="input-field col s6">
               <input type="number" id="number" class="validate">
               <label for="number" class="active">Number of Jokes</label>
               <a id="jokes" class="waves-effect waves-light btn-large blue">Get Jokes</a>
            </div>
         </div>
      </form>
      <ul class="jokes"></ul>
   </div>

   </div>
   <script src="/js/chuck.js"></script>
</body>

</html>
